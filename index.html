<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5A7DFF" />
  <title>Songe — l'app pour les amoureux de lecture</title>
  <meta name="description" content="Songe, l'app pour suivre tes lectures, partager tes coups de cœur et découvrir ce que lisent tes amis." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Songe — l'app pour les amoureux de lecture" />
  <meta property="og:description" content="Suis tes lectures, partage tes coups de cœur, découvre ce que lisent tes amis." />
  <meta property="og:url" content="https://songe.techno.studio" />
  <meta property="og:site_name" content="Songe" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Apple Smart App Banner -->
  <meta name="apple-itunes-app" content="app-id=6741076205" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #5A7DFF;
      --accent-soft: rgba(90, 125, 255, 0.08);
      --primary-text: #14181B;
      --secondary-text: #57636C;
      --bg: #F1F4F8;
      --card: #FFFFFF;
      --shadow: 0 12px 40px rgba(20, 24, 27, 0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--primary-text);
      background: var(--bg);
      min-height: 100vh;
      letter-spacing: -0.2px;
    }

    body {
      background:
        radial-gradient(ellipse at top, rgba(90, 125, 255, 0.12) 0%, transparent 60%),
        linear-gradient(180deg, #EAF0FF 0%, #F1F4F8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .container {
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 32px rgba(90, 125, 255, 0.35);
      margin-bottom: 24px;
      font-size: 36px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.8px;
    }

    p.lead {
      font-size: 16px;
      font-weight: 400;
      color: var(--secondary-text);
      margin: 0 0 32px 0;
      line-height: 1.5;
    }

    .stores {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-radius: 14px;
      background: var(--primary-text);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      width: 100%;
      max-width: 280px;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 14px rgba(20, 24, 27, 0.15);
    }
    .store-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(20, 24, 27, 0.2); }
    .store-btn:active { transform: translateY(0); }
    .store-btn svg { flex-shrink: 0; }

    footer {
      margin-top: 48px;
      font-size: 13px;
      color: var(--secondary-text);
    }
    footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo">☁️</div>
    <h1>Songe</h1>
    <p class="lead">L'app pour suivre tes lectures, partager tes coups de cœur et découvrir ce que lisent tes amis.</p>

    <div class="stores">
      <a class="store-btn" href="https://apps.apple.com/app/id6741076205" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 12.04c-.03-3.02 2.47-4.47 2.58-4.54-1.41-2.06-3.6-2.34-4.38-2.37-1.86-.19-3.63 1.1-4.58 1.1-.95 0-2.4-1.07-3.95-1.04-2.03.03-3.91 1.18-4.95 3-2.11 3.66-.54 9.06 1.51 12.03 1.01 1.46 2.21 3.09 3.79 3.03 1.52-.06 2.1-.99 3.94-.99s2.36.99 3.97.96c1.64-.03 2.68-1.48 3.69-2.94 1.16-1.69 1.64-3.32 1.67-3.41-.04-.02-3.21-1.23-3.24-4.88zM14.13 3.66c.83-1.01 1.39-2.41 1.24-3.81-1.2.05-2.66.8-3.52 1.81-.77.89-1.45 2.32-1.27 3.69 1.34.1 2.71-.68 3.55-1.69z"/></svg>
        Télécharger sur l'App Store
      </a>
      <a class="store-btn" href="https://play.google.com/store/apps/details?id=studio.techno.songe" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.198l2.807 1.626a1 1 0 0 1 0 1.73l-2.808 1.626L15.121 12l2.577-2.491zM5.864 2.658L16.802 8.99l-2.302 2.302L5.864 2.658z"/></svg>
        Disponible sur Google Play
      </a>
    </div>
  </main>
</body>
</html>
